# Render Blueprint — free, no credit card required.
# Deploy: render.com -> New -> Blueprint -> connect this repo -> Apply.
# Gives a public HTTPS URL you can open on your iPhone.
services:
  - type: web
    name: f1-statguesser
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render's filesystem is ephemeral; the app self-seeds on boot.
      - key: F1_DB_PATH
        value: /tmp/f1stats.db
      # Pull real F1 history from the Jolpica API on boot (rate-limited, cached,
      # weekly-gated) instead of the synthetic seed. Falls back to synthetic if
      # api.jolpi.ca is unreachable.
      - key: F1_DATA_SOURCE
        value: jolpica
      # Pull from 1980 to the current season (end year is dynamic). Gives the
      # Prost/Senna/Mansell/Piquet and Schumacher eras; serving is biased toward
      # the modern era (see service.ERA_WEIGHT_BANDS).
      - key: F1_ETL_START_YEAR
        value: "1980"
