# Render Blueprint — free, no credit card required.
# Deploy: render.com -> New -> Blueprint -> connect this repo -> Apply.
# Gives a public HTTPS URL you can open on your iPhone.
services:
  - type: web
    name: f1-statguesser
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render's filesystem is ephemeral; the app self-seeds on boot.
      - key: F1_DB_PATH
        value: /tmp/f1stats.db
      # Serve the curated, validated 1000-question bank committed in the repo
      # (backend/app/data/questions.json). Instant boot, no network needed.
      # To rebuild the bank from live data:
      #   F1_DATA_SOURCE=jolpica F1_ETL_START_YEAR=1980 python3 -m app.seed --export
      - key: F1_DATA_SOURCE
        value: dataset
