# Render Blueprint — free, no credit card required.
# Deploy: render.com -> New -> Blueprint -> connect this repo -> Apply.
# Gives a public HTTPS URL you can open on your iPhone.
services:
  - type: web
    name: f1-statguesser
    runtime: python
    plan: free
    branch: main
    # Install deps, then fetch the Litestream binary into backend/bin so the
    # start command can stream the SQLite DB to object storage. The download is
    # best-effort (|| true): if it fails the app still boots, just without
    # durability (start.sh logs a warning).
    buildCommand: |
      pip install -r backend/requirements.txt
      mkdir -p backend/bin
      curl -fsSL https://github.com/benbjohnson/litestream/releases/download/v0.3.13/litestream-v0.3.13-linux-amd64.tar.gz \
        | tar -xz -C backend/bin litestream || echo "litestream download failed; continuing without durability"
    startCommand: cd backend && ./start.sh
    envVars:
      # SQLite path. Render's free filesystem is ephemeral, so this lives in /tmp
      # and is made durable by Litestream replication (below) rather than a disk.
      - key: F1_DB_PATH
        value: /tmp/f1stats.db
      # Serve the curated, validated 1000-question bank committed in the repo
      # (backend/app/data/questions.json). Instant boot, no network needed.
      # To rebuild the bank from live data:
      #   F1_DATA_SOURCE=jolpica F1_ETL_START_YEAR=1980 python3 -m app.seed --export
      - key: F1_DATA_SOURCE
        value: dataset
      # Turn OFF the proofreading endpoint in production. /api/v1/dev/questions
      # returns every question WITH its verified answer (a deliberate dev-only
      # crossing of the no-answers trust boundary); leaving it on lets anyone fetch
      # the answer key and defeat the leaderboard. Defaults ON for local dev.
      - key: F1_DEV_TOOLS
        value: "0"
      # First-party analytics. Event collection is always on (pseudonymous, no
      # third party); the /analytics dashboard + summary API are gated by this
      # token. Leave it unset to keep the dashboard disabled (collection still
      # runs); set any strong secret to view metrics at /analytics.
      - key: F1_ANALYTICS_TOKEN
        sync: false

      # ── Free durable accounts (Litestream → S3-compatible object storage) ────
      # The question bank is rebuilt from the committed snapshot on every boot, but
      # accounts, sessions and verified play history live ONLY in the SQLite file —
      # which the ephemeral free host wipes on every redeploy AND cold start. Rather
      # than a paid disk or Postgres, Litestream continuously replicates the DB to a
      # free object-storage bucket and restores it on boot (see start.sh).
      #
      # To enable (free, ~5 min — see README → "Free durable accounts"): create a
      # Backblaze B2 bucket (10 GB free, no card) or Cloudflare R2 bucket, then set
      # the five values below. Leaving REPLICA_BUCKET blank keeps the ephemeral
      # behaviour, so the service still deploys as-is.
      - key: LITESTREAM_REPLICA_BUCKET
        sync: false            # e.g. f1-statguesser-db
      - key: LITESTREAM_REPLICA_PATH
        value: f1stats
      - key: LITESTREAM_REPLICA_ENDPOINT
        sync: false            # e.g. s3.us-west-002.backblazeb2.com
      - key: LITESTREAM_REPLICA_REGION
        sync: false            # e.g. us-west-002
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false            # B2 keyID / R2 access key (secret)
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false            # B2 applicationKey / R2 secret (secret)
