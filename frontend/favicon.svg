<?xml version="1.0" encoding="UTF-8"?>
<!-- GridMaster favicon: the Chequered G — a pixel-grid monogram of rounded
     squares (starting grid + chequered flag + the game's own share-grid
     language), leaning forward row-by-row like pixel italics. The lit square
     at the G's crossbar is "your spot on the grid, claimed"; the orange
     matches the default (McLaren) theme — the UI recolours per team at
     runtime. Vector, so it stays crisp at every size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="22" fill="#0a0d12"/>
  <g transform="translate(11,11) scale(0.78)">
    <g fill="#eef2f7">
      <rect x="29"   y="6"  width="16" height="16" rx="4"/>
      <rect x="47"   y="6"  width="16" height="16" rx="4"/>
      <rect x="65"   y="6"  width="16" height="16" rx="4"/>
      <rect x="8.5"  y="24" width="16" height="16" rx="4"/>
      <rect x="6"    y="42" width="16" height="16" rx="4"/>
      <rect x="60"   y="42" width="16" height="16" rx="4"/>
      <rect x="78"   y="42" width="16" height="16" rx="4"/>
      <rect x="3.5"  y="60" width="16" height="16" rx="4"/>
      <rect x="75.5" y="60" width="16" height="16" rx="4"/>
      <rect x="19"   y="78" width="16" height="16" rx="4"/>
      <rect x="37"   y="78" width="16" height="16" rx="4"/>
      <rect x="55"   y="78" width="16" height="16" rx="4"/>
      <rect x="73"   y="78" width="16" height="16" rx="4"/>
    </g>
    <rect x="42" y="42" width="16" height="16" rx="4" fill="#FF8000"/>
  </g>
</svg>
