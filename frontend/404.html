<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Off the track — GridMaster</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#FF8000" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,700;0,900;1,900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <!-- Self-contained styles: this page must render even if /static is unreachable. -->
  <style>
    :root { --bg:#0a0d12; --surface:#151b24; --line:#252d38; --text:#eef2f7;
            --muted:#8b95a5; --accent:#FF8000; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           padding:1.5rem; text-align:center; color:var(--text);
           font-family:'Titillium Web','Segoe UI',system-ui,sans-serif;
           background:radial-gradient(1100px 600px at 80% -10%,
             color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%), var(--bg); }
    .wrap { max-width:30rem; }
    .mark { width:4.5rem; height:4.5rem; color:var(--accent); margin:0 auto 1.4rem; display:block; }
    .code { font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:700; letter-spacing:.25em;
            font-size:.72rem; text-transform:uppercase; color:var(--muted); margin:0 0 .6rem; }
    h1 { font-style:italic; font-weight:900; text-transform:uppercase; letter-spacing:.01em;
         font-size:clamp(1.8rem,7vw,2.8rem); margin:0 0 .8rem; }
    p { color:var(--muted); line-height:1.55; margin:0 0 1.8rem; font-size:1rem; }
    .btn { display:inline-block; background:var(--accent); color:#000; font-weight:800;
           border-radius:8px; padding:.8rem 1.6rem; text-decoration:none; font-size:1rem;
           box-shadow:inset 0 -3px 0 rgba(0,0,0,.25); transition:filter .12s; }
    .btn:hover { filter:brightness(1.08); }
    .strip { height:10px; margin-top:2.2rem;
             background:repeating-conic-gradient(#fff 0 25%, var(--bg) 0 50%) 0 0/20px 20px; opacity:.18; }
  </style>
</head>
<body>
  <div class="wrap">
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
      <path d="M16 82 L31 25 L69 25 L84 82" fill="none" stroke="currentColor"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <p class="code">Error 404 · Yellow flag</p>
    <h1>You've run wide</h1>
    <p>This corner of the circuit doesn't exist. The page may have moved, or the
       link took a wrong turn. Let's get you back on the racing line.</p>
    <a class="btn" href="/">Back to the grid</a>
    <div class="strip" aria-hidden="true"></div>
  </div>
</body>
</html>
