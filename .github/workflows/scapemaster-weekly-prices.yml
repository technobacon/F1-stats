name: ScapeMaster weekly GE prices

# Refreshes the ScapeMaster Grand Exchange price snapshot from the live OSRS Wiki
# real-time prices API once a week, then rebuilds the committed question bank. A
# sanity gate (scripts/verify_bank.py) blocks the commit if the snapshot looks
# broken (missing prices, absurd anchors, a >3x swing), so the curated bank is
# never overwritten with bad numbers. Only touches files under scapemaster/.
# Also runnable on demand from the Actions tab.

on:
  schedule:
    - cron: "0 6 * * 3"   # Wednesdays 06:00 UTC (offset from the F1 refresh)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scapemaster-weekly-prices
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scapemaster/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -q -r requirements.txt

      - name: Refresh GE prices and rebuild the bank
        run: python -m app.seed --export --source wiki --count 1200

      - name: Sanity gate (block bad data)
        run: python -m scripts.verify_bank

      - name: Run test suite
        run: python -m pytest -q

      - name: Commit refreshed bank if it changed
        run: |
          # dataset_meta.json carries the build date, so it changes every run and
          # the bank's "Data refreshed" line stays current even on a quiet week.
          if git diff --quiet -- app/data/items.json app/data/questions.json app/data/arcade.json app/data/dataset_meta.json app/data/snapshot_meta.json; then
            echo "No data changes this week."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/items.json app/data/questions.json app/data/arcade.json app/data/dataset_meta.json app/data/snapshot_meta.json
          git commit -m "Weekly GE price refresh from the OSRS Wiki ($(date -u +%Y-%m-%d))"
          git push
